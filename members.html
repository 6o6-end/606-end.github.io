<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的世界 - 个人介绍</title>
    <style>
        /* 全局+导航栏样式，和首页完全一致 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background-color: #f5f5f5;
        }
        .nav-bar {
            display: flex;
            width: 100%;
            height: 80px;
            background-color: #fff;
            border-bottom: 2px solid #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 999;
        }
        .nav-item {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: 500;
            border-right: 1px solid #eee;
        }
        .nav-item:last-child {
            border-right: none;
        }
        .nav-item a {
            text-decoration: none;
            color: #333;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .nav-item a.active {
            background-color: #333;
            color: #fff;
        }
        .nav-item a:hover {
            background-color: #f5f5f5;
        }
        .nav-item a.active:hover {
            background-color: #333;
            color: #fff;
        }

        /* 成员页专属样式，完全匹配你的线框图布局 */
       .member-content {
           padding: 40px;
           max-width: 1400px;
           margin: 0 auto;
    /* 核心：添加背景图 */
           background: url("images/beijingtu2.jpg") no-repeat center center fixed;
           background-size: cover; /* 背景图全屏覆盖 */
    /* 加半透明遮罩，避免文字和背景图混在一起看不清 */
           position: relative;
           min-height: calc(100vh - 80px); /* 撑满页面高度 */
}
/* 遮罩层（透明黑色，让内容更清晰） */
     .member-content::before {
           content: "";
           position: absolute;
           top: 0;
           left: 0;
           width: 100%;
           height: 100%;
           background-color: rgba(255, 255, 255, 0.85); /* 白色85%透明，可调整 */
           z-index: -1; /* 遮罩在内容下面 */
}
        /* 上排：4张成员头像 */
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            margin-bottom: 40px;
        }
        .avatar-card {
            width: 100%;
            aspect-ratio: 1/1;
            border: 3px solid #333;
            border-radius: 20px;
            overflow: hidden;
        }
        .avatar-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 下排：4个文字介绍 */
        .intro-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }
        .intro-card {
            width: 100%;
            aspect-ratio: 3/4;
            border: 3px solid #333;
            border-radius: 20px;
            padding: 20px;
            background-color: #ffffff5f;
;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            line-height: 1.8;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="nav-bar">
        <div class="nav-item"><a href="index.html">首页</a></div>
        <div class="nav-item"><a href="members.html" class="active">个人介绍</a></div>
        <div class="nav-item"><a href="photos.html">我的照片</a></div>
    </div>

    <!-- 成员页内容 -->
    <div class="member-content">
        <!-- 上排4张头像 -->
        <div class="avatar-grid">
            <div class="avatar-card"><img src="images/touxiang1.jpg" alt="成员1"></div>
            <div class="avatar-card"><img src="images/touxiang2.jpg" alt="成员2"></div>
            <div class="avatar-card"><img src="images/touxiang3.jpg" alt="成员3"></div>
            <div class="avatar-card"><img src="images/touixiang4.jpg" alt="成员4"></div>
        </div>

        <!-- 下排4个文字介绍 -->
        <div class="intro-grid">
            <div class="intro-card">
                姓名：赵月伊<br>
                星座：狮子座<br>
                爱好：看书、打鼓、健身、规划学习、稳步提升自己
            </div>
            <div class="intro-card">
                姓名：赵晚伊<br>
                星座：金牛座<br>
                爱好：手绘、听轻音乐、拍照记录生活、散步
            </div>
            <div class="intro-card">
                姓名：赵知伊<br>
                星座：狮子座<br>
                爱好：整理文档、研究专业知识、看学术内容、逻辑思考
            </div>
            <div class="intro-card">
                姓名：赵乐伊<br>
                星座：金牛座<br>
                爱好：逛吃、看综艺、享受日常、佛系休闲、慢节奏生活
            </div>
        </div>
    </div>
</body>
</html>
