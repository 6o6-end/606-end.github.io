<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>308的世界 - 个人介绍</title>
    <style>
        /* 全局+导航栏样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background-color: #f5f5f5;
        }
        .nav-bar {
            display: flex;
            width: 100%;
            height: 80px;
            background-color: #fff;
            border-bottom: 2px solid #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 999;
        }
        .nav-item {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: 500;
            border-right: 1px solid #eee;
        }
        .nav-item:last-child {
            border-right: none;
        }
        .nav-item a {
            text-decoration: none;
            color: #333;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .nav-item a.active {
            background-color: #333;
            color: #fff;
        }
        .nav-item a:hover {
            background-color: #f5f5f5;
        }
        .nav-item a.active:hover {
            background-color: #333;
            color: #fff;
        }

        /* 个人页面主体 */
       .person-content {
           padding: 40px;
           max-width: 900px;
           margin: 0 auto;
           background: url("images/beijingtu2.jpg") no-repeat center center fixed;
           background-size: cover;
           position: relative;
           min-height: calc(100vh - 80px);
           display: flex;
           flex-direction: column;
           align-items: center;
           gap: 35px;
}
     .person-content::before {
           content: "";
           position: absolute;
           top: 0;
           left: 0;
           width: 100%;
           height: 100%;
           background-color: rgba(255, 255, 255, 0.85);
           z-index: -1;
}
        /* 单人头像 */
        .avatar-card {
            width: 320px;
            aspect-ratio: 1/1;
            border: 3px solid #333;
            border-radius: 20px;
            overflow: hidden;
        }
        .avatar-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 个人信息卡片 */
        .info-card {
            width: 100%;
            max-width: 600px;
            padding: 35px;
            border: 3px solid #333;
            border-radius: 20px;
            background-color: #ffffff5f;
            font-size: 18px;
            line-height: 2;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="nav-bar">
        <div class="nav-item"><a href=" ">首页</a ></div>
        <div class="nav-item"><a href="person.html" class="active">个人介绍</a ></div>
        <div class="nav-item"><a href="photos.html">宿舍合照</a ></div>
    </div>

    <!-- 单人页面内容 -->
    <div class="person-content">
        <div class="avatar-card">
            < img src="images/touxiang4.jpg" alt="我的头像">
        </div>
        <div class="info-card">
            姓名：赵月伊<br>
            星座：金牛座<br>
            专业：智能交互设计<br>
            爱好：听歌、画画、研究车载交互<br>
            目标：努力保研985，未来进入车企做智能交互设计
        </div>
    </div>
</body>
</html>
